<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Stacked Deck">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f4385"/>
      <stop offset="100%" stop-color="#0f2450"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfcf7"/>
      <stop offset="100%" stop-color="#f1e9d2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0b54a"/>
      <stop offset="100%" stop-color="#a07520"/>
    </linearGradient>
  </defs>

  <!-- Card 3 (back, deepest) -->
  <g transform="translate(22 22)">
    <rect width="32" height="40" rx="3.5" fill="url(#navy)" stroke="url(#gold)" stroke-width="1.2"/>
  </g>

  <!-- Card 2 (middle) -->
  <g transform="translate(16 16)">
    <rect width="32" height="40" rx="3.5" fill="url(#navy)" stroke="url(#gold)" stroke-width="1.2"/>
  </g>

  <!-- Card 1 (front, the active card) -->
  <g transform="translate(10 10)">
    <rect width="32" height="40" rx="3.5" fill="url(#cream)" stroke="url(#gold)" stroke-width="1.6"/>
    <rect x="2.4" y="2.4" width="27.2" height="35.2" rx="2.2" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.65"/>
    <!-- Six-pointed pinwheel: nods to the six categories -->
    <g transform="translate(16 20)" fill="url(#gold)">
      <path d="M0 -8 L1.8 -1.8 L8 0 L1.8 1.8 L0 8 L-1.8 1.8 L-8 0 L-1.8 -1.8 Z"/>
      <g transform="rotate(30)">
        <path d="M0 -7 L1.4 -1.4 L7 0 L1.4 1.4 L0 7 L-1.4 1.4 L-7 0 L-1.4 -1.4 Z" opacity="0.55"/>
      </g>
      <circle r="1.4" fill="#fdfcf7"/>
    </g>
  </g>
</svg>
